<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexum — Gestión de Recursos Semánticos · UMU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Aplicar el tema antes de que React monte para evitar el parpadeo
      // si no se hace esto hay un flash blanco al cargar en modo oscuro
      var tema = localStorage.getItem('tema') || 'claro';
      document.documentElement.setAttribute('data-tema', tema);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
