# Docker Compose para el TFG de Gestión de Recursos Semánticos
# Levanta tres servicios: Fuseki (BD semántica), backend (API) y frontend (React)

services:

  fuseki:
    build: ./fuseki
    container_name: fuseki_tfg
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=${FUSEKI_PASSWORD}
      - JAVA_OPTIONS=-Xmx2g -Xms512m
    volumes:
      - fuseki_data:/fuseki/databases
    networks:
      - tfg_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Servicio one-shot: carga la ontología base y materializa las
  # inferencias OWL en cuanto Fuseki está sano. Es idempotente, así que
  # en arranques posteriores no vuelve a cargar nada.
  fuseki-init:
    image: curlimages/curl:8.7.1
    container_name: fuseki_init_tfg
    depends_on:
      fuseki:
        condition: service_healthy
    environment:
      - FUSEKI_URL=http://fuseki:3030
      - FUSEKI_DATASET=recursos
      - FUSEKI_USER=${FUSEKI_USER}
      - FUSEKI_PASSWORD=${FUSEKI_PASSWORD}
    volumes:
      - ./fuseki/ontologia-base.ttl:/data/ontologia-base.ttl:ro
      - ./fuseki/load-data.sh:/load-data.sh:ro
    entrypoint: ["sh", "/load-data.sh"]
    restart: "no"
    networks:
      - tfg_network

  backend:
    build: ./backend
    container_name: backend_tfg
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FUSEKI_URL=http://fuseki:3030
      - FUSEKI_DATASET=recursos
      - FUSEKI_USER=${FUSEKI_USER}
      - FUSEKI_PASSWORD=${FUSEKI_PASSWORD}
      # Las credenciales y la clave JWT se leen del fichero .env (no versionado).
      # Copia .env.example a .env y rellena los valores. Ver anexo de despliegue.
      - JWT_SECRET=${JWT_SECRET}
      # Caducidad del token JWT, configurable desde .env (por defecto 24h)
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - NODE_ENV=development
    depends_on:
      fuseki:
        condition: service_healthy
    networks:
      - tfg_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: frontend_tfg
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - tfg_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  tfg_network:
    driver: bridge

volumes:
  fuseki_data:
